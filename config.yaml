vcf: "data/raw/chr22.vcf.gz"

outputs:
  variants: "data/processed/variants.tsv"
  genotype_matrix: "data/processed/genotype_matrix.tsv"
  clusters: "results/clusters/clusters.tsv"
  pca_plot: "results/figures/pca_clusters.pdf"

processing:
  max_variants: 25000

filtering:
  region: "22:16000000-17000000"
  min_qual: 30
  keep_variant_type: "snps"
  min_alleles: 2
  max_alleles: 2

clustering:
  n_clusters: 3
  random_seed: 42